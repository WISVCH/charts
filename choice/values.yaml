fullnameOverride: ""
replicaCount: 1
serviceAccountName: default

service:
  type: ClusterIP
  port: 80

image:
  repository: ghcr.io/wisvch/choice
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: {}

hibernate:
  generateDdl: false
  hb2mddl:
    auto: validate

postgres:
  username: ""
  password: ""
  host: ""
  port: 5432
  database: choice
  cloudSQL: false
  cloudSQLProxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
    instanceConnectionName: wisvch:europe-west4:geurt
